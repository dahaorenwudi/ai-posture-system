<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>打卡日历</title>
  <link rel="stylesheet" href="css/style.css?v=20260709-utf8fix">
  <style>
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .month-nav .month-label {
      font-size: 17px;
      font-weight: 700;
    }
    .month-nav button {
      background: var(--border-light);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      color: var(--text);
    }
    .weekday-header,
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .weekday-header {
      margin-bottom: 6px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-tertiary);
    }
    .cal-cell {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      background: var(--bg);
      min-height: 0;
    }
    .cal-cell.other-month {
      color: var(--border);
      background: transparent;
    }
    .cal-cell.today {
      border: 2px solid var(--primary);
    }
    .cal-cell.checked {
      background: var(--success);
      color: white;
    }
    .cal-cell.leave {
      background: var(--primary);
      color: white;
    }
    .cal-cell.missed {
      background: var(--danger);
      color: white;
    }
    .cal-cell.pending {
      background: #fef3c7;
      color: #92400e;
    }
    .day-icon {
      font-size: 10px;
      margin-top: 2px;
    }
    .legend {
      display: flex;
      gap: 14px;
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-secondary);
      flex-wrap: wrap;
    }
    .legend span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <a href="challenge_progress.html" class="back-btn">&#8592;</a>
    <h1>打卡日历</h1>
    <div></div>
  </div>

  <div class="container">
    <div class="card" style="margin-top:8px;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
        <h2 class="card-title" style="margin-bottom:0;">打卡日历</h2>
        <span style="font-size:13px; color:var(--text-tertiary);" id="challenge-name"></span>
      </div>

      <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <span class="month-label" id="month-label">2026年7月</span>
        <button onclick="changeMonth(1)">›</button>
      </div>

      <div class="weekday-header">
        <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
      </div>

      <div class="cal-grid" id="cal-grid"></div>

      <div class="legend">
        <span><span class="legend-dot" style="background:var(--success);"></span>已打卡</span>
        <span><span class="legend-dot" style="background:var(--primary);"></span>请假</span>
        <span><span class="legend-dot" style="background:var(--danger);"></span>缺卡</span>
        <span><span class="legend-dot" style="background:#fef3c7;"></span>待完成</span>
      </div>
    </div>

    <div class="card" id="day-detail" style="display:none;">
      <h3 class="card-title">当日详情</h3>
      <div id="day-detail-content"></div>
    </div>

    <div class="card">
      <h3 class="card-title">本月统计</h3>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="value" style="color:var(--success);" id="total-checked">0</div>
          <div class="label">已打卡</div>
        </div>
        <div class="stat-item">
          <div class="value" style="color:var(--primary);" id="total-leave">0</div>
          <div class="label">请假</div>
        </div>
        <div class="stat-item">
          <div class="value" style="color:var(--danger);" id="total-missed">0</div>
          <div class="label">缺卡</div>
        </div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html"><span class="icon">&#8962;</span><span>首页</span></a>
    <a href="challenge_progress.html" class="active"><span class="icon">&#10003;</span><span>打卡</span></a>
    <a href="user.html"><span class="icon">&#9679;</span><span>我的</span></a>
  </nav>

  <script src="js/app.js?v=20260709-utf8fix" charset="UTF-8"></script>
  <script>
    let viewYear;
    let viewMonth;
    let recordMap = {};

    function initCalendar() {
      APP.loadData();
      const now = new Date();
      viewYear = now.getFullYear();
      viewMonth = now.getMonth();
      buildRecordMap();
      renderCalendar();
    }

    function buildRecordMap() {
      recordMap = {};
      const challenge = APP.activeChallenge;
      if (!challenge) return;
      const config = APP.challenges[challenge.days] || { name: challenge.days + '天挑战' };
      document.getElementById('challenge-name').textContent = config.name;
      (challenge.dailyRecords || []).forEach(function(record) {
        recordMap[record.date] = record;
      });
    }

    function changeMonth(delta) {
      viewMonth += delta;
      if (viewMonth < 0) {
        viewMonth = 11;
        viewYear -= 1;
      } else if (viewMonth > 11) {
        viewMonth = 0;
        viewYear += 1;
      }
      renderCalendar();
    }

    function dateKey(year, month, day) {
      return year + '-' + String(month + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
    }

    function renderCalendar() {
      document.getElementById('month-label').textContent = viewYear + '年' + (viewMonth + 1) + '月';
      const grid = document.getElementById('cal-grid');
      const first = new Date(viewYear, viewMonth, 1);
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      const startWeek = first.getDay();
      const today = new Date();
      const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());
      const cells = [];

      for (let i = 0; i < startWeek; i++) {
        cells.push('<div class="cal-cell other-month"></div>');
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const key = dateKey(viewYear, viewMonth, day);
        const record = recordMap[key];
        const status = record ? record.status : '';
        const icon = status === 'checked' ? '✓' : status === 'leave' ? '假' : status === 'missed' ? '缺' : status === 'pending' ? '待' : '';
        const classes = ['cal-cell'];
        if (status) classes.push(status);
        if (key === todayKey) classes.push('today');
        cells.push(`<div class="${classes.join(' ')}" onclick="showDayDetail('${key}')"><div>${day}</div><div class="day-icon">${icon}</div></div>`);
      }

      grid.innerHTML = cells.join('');
      renderStats();
    }

    function renderStats() {
      const records = Object.values(recordMap).filter(function(record) {
        const d = new Date(record.date);
        return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
      });
      document.getElementById('total-checked').textContent = records.filter(function(r) { return r.status === 'checked'; }).length;
      document.getElementById('total-leave').textContent = records.filter(function(r) { return r.status === 'leave'; }).length;
      document.getElementById('total-missed').textContent = records.filter(function(r) { return r.status === 'missed'; }).length;
    }

    function showDayDetail(key) {
      const record = recordMap[key];
      const panel = document.getElementById('day-detail');
      const content = document.getElementById('day-detail-content');
      if (!record) {
        panel.style.display = 'none';
        return;
      }
      const statusText = record.status === 'checked' ? '已打卡' : record.status === 'leave' ? '已请假' : record.status === 'missed' ? '缺卡' : '待完成';
      content.innerHTML = '<p style="font-size:14px; color:var(--text-secondary); line-height:1.8;">日期：' + key + '<br>第 ' + record.dayNumber + ' 天<br>状态：' + statusText + '</p>';
      panel.style.display = 'block';
    }

    document.addEventListener('DOMContentLoaded', initCalendar);
  </script>
</body>
</html>
